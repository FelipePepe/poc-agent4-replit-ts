sonar.projectKey=poc-agent4-replit-ts
sonar.projectName=poc-agent4-replit-ts
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9000
# token passed via SONAR_TOKEN env var or -Dsonar.token CLI flag

sonar.sources=src
sonar.tests=tests
sonar.exclusions=node_modules/**,dist/**,coverage/**,workspace/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-reporter.xml

sonar.sourceEncoding=UTF-8
